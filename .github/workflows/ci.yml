# CI: lint + typecheck + build ad ogni push/PR su main.
# Le chiavi Clerk qui sono placeholder di formato valido: servono solo alla
# build (nessuna chiamata reale). Il job E2E è documentato in fondo, da
# attivare quando i secrets saranno configurati sul repo.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2xlcmsuZXhhbXBsZS5jb20k"
  CLERK_SECRET_KEY: "sk_test_placeholder000000000000000000000000"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx prisma generate && npx tsc --noEmit

      - name: Build
        run: npm run build

